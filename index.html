<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#173b35">
  <meta name="description" content="小倉百人一首を、毎日少しずつ覚えるための学習アプリ">
  <title>一首 — 百人一首を覚える</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@500;600;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css?v=20260704-36">
</head>
<body>
  <div class="paper-noise"></div>
  <header class="site-header">
    <a class="brand" href="#home" aria-label="ホームへ">
      <span class="brand-mark">一</span>
    </a>
    <nav aria-label="メインメニュー">
      <a href="#home" data-nav="home">今日の稽古</a>
      <a href="#learn" data-nav="learn">歌をみる</a>
      <a href="#quiz" data-nav="quiz">腕だめし</a>
    </nav>
  </header>

  <main id="app" tabindex="-1"></main>

  <footer>
    <span>小倉百人一首</span>
    <span>進捗はこの端末に保存されます</span>
  </footer>

  <template id="home-template">
    <section class="hero">
      <div class="hero-copy">
        <p class="eyebrow">百の歌を、わたしの言葉に。</p>
        <h1>一日一首、<br><em>記憶に咲かせる。</em></h1>
        <p class="lead">上の句から下の句へ。声に出し、思い出し、少しずつ。今日の五首から始めましょう。</p>
        <div class="hero-actions">
          <a class="button primary" href="#quiz">今日の稽古を始める <span>→</span></a>
          <a class="text-link" href="#learn">百首を眺める</a>
        </div>
      </div>
      <div class="featured-card" aria-label="今日の一首">
        <div class="sun"></div>
        <span class="vertical-label">今日の一首</span>
        <div class="featured-poem"></div>
      </div>
    </section>
    <section class="dashboard">
      <div>
        <p class="eyebrow">あなたの歩み</p>
        <h2>今日も、ひとつ先へ。</h2>
      </div>
      <div class="stats"></div>
    </section>
    <section class="continue-panel"></section>
  </template>

  <template id="learn-template">
    <section class="page-heading">
      <p class="eyebrow">歌をみる</p>
      <h1>百首との出会い</h1>
      <p>歌番号や言葉、作者から探せます。札を開いて声に出してみましょう。</p>
    </section>
    <div class="toolbar">
      <label class="search"><span>⌕</span><input id="search" type="search" placeholder="歌や作者を検索" autocomplete="off"></label>
      <div class="filters" role="group" aria-label="習得状況で絞り込み">
        <button class="active" data-filter="all">すべて</button>
        <button data-filter="learning">練習中</button>
        <button data-filter="mastered">覚えた</button>
      </div>
    </div>
    <p class="result-count"></p>
    <section class="poem-grid"></section>
  </template>

  <template id="quiz-template">
    <section class="quiz-shell">
      <div class="quiz-top">
        <a href="#home" class="close-quiz" aria-label="クイズを終了">×</a>
        <div><span class="quiz-count"></span><div class="progress-track"><i></i></div></div>
        <span class="score"></span>
      </div>
      <div class="quiz-content"></div>
    </section>
  </template>

  <dialog id="poem-dialog"><button class="dialog-close" aria-label="閉じる">×</button><div class="dialog-body"></div></dialog>
  <script src="app.js?v=20260704-35" defer></script>
</body>
</html>
